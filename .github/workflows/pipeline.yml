name: Pipeline — 闭环流水线

on:
  schedule:
    # 工作日 UTC 09:00 (北京时间 17:00)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install akshare pandas

      - name: Run Pipeline
        run: python pipeline/run_pipeline.py --top 5
        continue-on-error: true

      - name: Commit & Push results
        if: always()
        run: |
          git config user.name "pipeline-bot"
          git config user.email "pipeline@bot.local"
          git add output/ data/outputs/ data/raw/daily/ data/collection_days.json || true
          git commit -m "📊 Pipeline $(date +%Y-%m-%d)" || echo "no changes"
          git push || echo "push failed (check DEPLOY_KEY)"
