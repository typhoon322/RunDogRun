name: v2.2 Daily Backtest & Report

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install akshare pandas

      - name: Step 1 — Update data cache (incremental)
        run: python -c "
from v2_final.data.collector import batch_collect
codes = ['000001','600036','601398','600519','300750','000858','600030']
batch_collect(codes)
print('Data cache ready')
"

      - name: Step 2 — Validate data quality
        run: python -c "
from v2_final.data.validate import validate_directory
result = validate_directory('data/raw/daily')
assert result['invalid'] == 0, f'Data validation failed: {result[\"errors\"]}'
print(f'Validation: {result[\"valid\"]}/{result[\"total\"]} OK')
"

      - name: Step 3 — Run v2.5 pipeline (fast backtest from cache)
        run: python main.py --top 5

      - name: Debug — Check outputs
        run: |
          echo "=== Files ==="
          ls -la data/outputs/ 2>/dev/null || echo "no outputs dir"
          echo "=== Report ==="
          cat data/outputs/daily_report.json 2>/dev/null || echo "NO REPORT"
          echo "=== Pipeline ==="
          cat data/outputs/pipeline_log.json 2>/dev/null || echo "NO PIPELINE LOG"

      - name: Commit data cache + outputs
        run: |
          git config user.name "data-bot"
          git config user.email "data@bot.local"
          git add data/raw/ data/outputs/ state/ || true
          git commit -m "📊 数据+报告更新 $(date +%Y-%m-%d)" || echo "no changes"
          git push || echo "push skipped"

      - name: Upload daily report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: data/outputs/daily_report.json

      - name: Commit outputs
        run: |
          git config user.name "v2-bot"
          git config user.email "bot@v2.local"
          git add data/outputs/ logs/ || true
          git commit -m "📊 日报 $(date +%Y-%m-%d)" || echo "no changes"
          git push || echo "push skipped"
