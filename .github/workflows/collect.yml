name: v2.2 Daily Backtest & Report

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install akshare pandas

      - name: Run v2.2 pipeline (backtest + live signal + report)
        run: python main.py --symbol 000001

      - name: Upload daily report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: data/outputs/daily_report.json

      - name: Commit outputs
        run: |
          git config user.name "v2-bot"
          git config user.email "bot@v2.local"
          git add data/outputs/ logs/ || true
          git commit -m "📊 日报 $(date +%Y-%m-%d)" || echo "no changes"
          git push || echo "push skipped"
